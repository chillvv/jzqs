<h2>配送工作台 · 纯手动版</h2>
<p class="subtitle">没有推荐，没有算法，商家自己选区域分配</p>

<div class="mockup" style="margin-top: 16px;">
  <div class="mockup-header">配送工作台</div>
  <div class="mockup-body" style="padding: 16px;">

    <!-- Tab 切换 -->
    <div style="display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid #e2e8f0;">
      <div style="padding: 8px 20px; font-size: 14px; font-weight: 600; color: #2563eb; border-bottom: 2px solid #2563eb; cursor: pointer; margin-bottom: -2px;">午餐</div>
      <div style="padding: 8px 20px; font-size: 14px; color: #94a3b8; cursor: pointer;">晚餐</div>
    </div>

    <!-- 统计卡片 -->
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px;">
      <div style="background: #fff; border-radius: 8px; padding: 14px 16px; border: 1px solid #e2e8f0; border-left: 4px solid #f59e0b;">
        <div style="font-size: 12px; color: #94a3b8;">待分配</div>
        <div style="font-size: 24px; font-weight: 700; color: #f59e0b;">5 单</div>
      </div>
      <div style="background: #fff; border-radius: 8px; padding: 14px 16px; border: 1px solid #e2e8f0; border-left: 4px solid #3b82f6;">
        <div style="font-size: 12px; color: #94a3b8;">配送中</div>
        <div style="font-size: 24px; font-weight: 700; color: #3b82f6;">18 单</div>
      </div>
      <div style="background: #fff; border-radius: 8px; padding: 14px 16px; border: 1px solid #e2e8f0; border-left: 4px solid #ef4444;">
        <div style="font-size: 12px; color: #94a3b8;">区域缺骑手</div>
        <div style="font-size: 24px; font-weight: 700; color: #ef4444;">1 个区域</div>
      </div>
    </div>

    <!-- 操作栏 -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <div style="font-weight: 700; font-size: 15px;">待处理订单</div>
        <span style="background: #fef3c7; color: #f59e0b; font-size: 12px; padding: 2px 10px; border-radius: 10px; font-weight: 600;">5单需处理</span>
      </div>
      <div>
        <div style="display: flex; align-items: center; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 0 10px;">
          <span style="color: #94a3b8; font-size: 13px;">🔍</span>
          <input placeholder="搜索客户/地址" style="border: none; outline: none; padding: 6px 8px; font-size: 13px; width: 180px;">
        </div>
      </div>
    </div>

    <!-- 表格 -->
    <div style="background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; overflow: hidden;">
      <!-- 表头 -->
      <div style="display: grid; grid-template-columns: 36px 1.2fr 2fr 1.5fr 80px; gap: 8px; padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-size: 12px; color: #64748b; font-weight: 600;">
        <div><input type="checkbox"></div>
        <div>客户</div>
        <div>配送地址</div>
        <div>分配区域</div>
        <div style="text-align: center;">操作</div>
      </div>

      <!-- 行1 -->
      <div style="display: grid; grid-template-columns: 36px 1.2fr 2fr 1.5fr 80px; gap: 8px; padding: 12px 14px; border-bottom: 1px solid #f1f5f9; font-size: 13px; align-items: center;">
        <div><input type="checkbox"></div>
        <div style="font-weight: 500;">张三</div>
        <div style="color: #475569; font-size: 12px;">高新区科技路1号</div>
        <div>
          <span style="background: #fff; border: 1px solid #d1d5db; border-radius: 4px; padding: 3px 8px; font-size: 11px; color: #6b7280; display: inline-flex; align-items: center; gap: 4px; cursor: pointer;">
            选择区域 ▾
          </span>
        </div>
        <div style="text-align: center;">
          <button style="background: #e2e8f0; color: #94a3b8; border: none; border-radius: 4px; padding: 4px 12px; font-size: 12px; cursor: not-allowed;" disabled>分配</button>
        </div>
      </div>

      <!-- 行2 -->
      <div style="display: grid; grid-template-columns: 36px 1.2fr 2fr 1.5fr 80px; gap: 8px; padding: 12px 14px; border-bottom: 1px solid #f1f5f9; font-size: 13px; align-items: center;">
        <div><input type="checkbox" checked></div>
        <div style="font-weight: 500;">李四</div>
        <div style="color: #475569; font-size: 12px;">新源大道88号创新园</div>
        <div>
          <span style="background: #fff; border: 1px solid #d1d5db; border-radius: 4px; padding: 3px 8px; font-size: 11px; color: #6b7280; display: inline-flex; align-items: center; gap: 4px; cursor: pointer;">
            选择区域 ▾
          </span>
        </div>
        <div style="text-align: center;">
          <button style="background: #e2e8f0; color: #94a3b8; border: none; border-radius: 4px; padding: 4px 12px; font-size: 12px; cursor: not-allowed;" disabled>分配</button>
        </div>
      </div>

      <!-- 行3: 已选区域 -->
      <div style="display: grid; grid-template-columns: 36px 1.2fr 2fr 1.5fr 80px; gap: 8px; padding: 12px 14px; font-size: 13px; align-items: center; background: #f8fafc;">
        <div><input type="checkbox"></div>
        <div style="font-weight: 500;">王五</div>
        <div style="color: #475569; font-size: 12px;">老城区解放路15号</div>
        <div>
          <span style="background: #dbeafe; color: #2563eb; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; cursor: pointer;">
            老城区
            <span style="font-size: 10px;">✕</span>
          </span>
        </div>
        <div style="text-align: center;">
          <button style="background: #3b82f6; color: #fff; border: none; border-radius: 4px; padding: 4px 12px; font-size: 12px; cursor: pointer;">分配</button>
        </div>
      </div>
    </div>

    <!-- 底部批量操作栏 -->
    <div style="margin-top: 12px; display: flex; gap: 12px; align-items: center; padding: 12px 16px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
      <div style="font-size: 13px; color: #1e293b; font-weight: 500;">已选 <span style="color: #3b82f6;">1</span> 单</div>
      <div style="width: 160px;">
        <span style="background: #fff; border: 1px solid #d1d5db; border-radius: 6px; padding: 6px 10px; font-size: 13px; color: #6b7280; display: block; cursor: pointer;">
          选择区域 ▾
        </span>
      </div>
      <button style="background: #3b82f6; color: #fff; border: none; border-radius: 6px; padding: 7px 18px; font-size: 13px; font-weight: 500; cursor: pointer;">归入区域</button>
    </div>

  </div>
</div>

<div style="margin-top: 16px; padding: 12px; background: #f0fdf4; border-radius: 8px; border: 1px solid #bbf7d0; font-size: 13px; color: #166534;">
  <strong>简洁原则：</strong>没有推荐区域标注，没有智能派单按钮。每行就是一个下拉框选区域 → 点分配。或者批量勾选 → 批量归入区域。商家完全掌控。
</div>
