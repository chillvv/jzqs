services:
  mysql:
    image: mysql:8.0
    container_name: jzqs-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --performance_schema=OFF
      - --innodb_buffer_pool_size=256M
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 800M

  backend:
    build:
      context: ./backend
    container_name: jzqs-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SERVER_PORT: 8080
      APP_UPLOAD_DIR: /app/uploads
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      WECHAT_DEV_MODE: ${WECHAT_DEV_MODE:-false}
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
      WECHAT_CLOUD_ENV_ID: ${WECHAT_CLOUD_ENV_ID:-cloud1-4g88w3e2dedee471}
      JAVA_OPTS: "-Xmx512m -Xms512m"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 800M

  admin:
    build:
      context: ./admin
    container_name: jzqs-admin
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2
    container_name: jzqs-caddy
    restart: unless-stopped
    depends_on:
      - admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  mysql_data:
  backend_uploads:
  caddy_data:
  caddy_config:
